<svg width="120" height="120" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect x="10" y="5" width="80" height="90" rx="15" fill="#4CAF50"></rect>

  <!-- Screen -->
  <rect x="20" y="15" width="60" height="20" rx="5" fill="#E8F5E9"></rect>

  <!-- Buttons -->
  <g fill="#FFFFFF">
    <circle cx="30" cy="50" r="5"></circle>
    <circle cx="50" cy="50" r="5"></circle>
    <circle cx="70" cy="50" r="5"></circle>

    <circle cx="30" cy="65" r="5"></circle>
    <circle cx="50" cy="65" r="5"></circle>
    <circle cx="70" cy="65" r="5"></circle>

    <circle cx="30" cy="80" r="5"></circle>
    <circle cx="50" cy="80" r="5"></circle>
    <circle cx="70" cy="80" r="5"></circle>
  </g>

  <!-- Plus symbol -->
  <g stroke="#4CAF50" stroke-width="2">
    <line x1="47" y1="62" x2="53" y2="62"></line>
    <line x1="50" y1="59" x2="50" y2="65"></line>
  </g>
</svg>